services:
  - type: web
    name: soeurs-finds
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: soeurs-finds-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: SITE_URL
        value: https://www.lessoeurs-finds.com
      - key: SOEURS_FINDS_DATA
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
