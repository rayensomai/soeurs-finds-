services:
  - type: web
    name: soeurs-finds
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: SITE_URL
        value: https://soeurs-finder.com
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
